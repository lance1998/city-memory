<!DOCTYPE html>
<html lang="zh-CN" data-theme="modern">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>城市微记忆 · 地标时空共建地图</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="style.css?v=20250707l">
  <link rel="stylesheet" href="style-patch.css?v=20250707l">
  <style id="app-css"></style>
  <style>
    .modal, .detail-modal {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .modal.show, .detail-modal.show {
      opacity: 1 !important;
      visibility: visible !important;
      pointer-events: auto !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="page-map" class="page active">
      <div class="map-header">
        <div class="city-selector" onclick="app.showCityPicker()">
          <i class="fas fa-map-marker-alt"></i>
          <span id="current-city">日照</span>
          <i class="fas fa-chevron-down"></i>
        </div>
        <div class="year-filter">
          <span class="filter-btn active" data-year="all">全部</span>
          <span class="filter-btn" data-year="70s">70s</span>
          <span class="filter-btn" data-year="80s">80s</span>
          <span class="filter-btn" data-year="90s">90s</span>
          <span class="filter-btn" data-year="00s">00s</span>
          <span class="filter-btn" data-year="10s">10s</span>
        </div>
      </div>
      <div id="map-container"></div>
      <div class="map-locate-btn" onclick="app.locateMe()"><i class="fas fa-crosshairs"></i></div>
    </div>
    <div id="page-discover" class="page">
      <div class="discover-header">
        <h1>发现</h1>
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="搜索地标、回忆、标签..." id="discover-search"><button class="search-clear-btn" onclick="app.clearSearch()" style="display:none;"><i class="fas fa-times-circle"></i></button></div>
        <div class="year-filter discover-filter">
          <span class="filter-btn active" data-year="all">全部</span>
          <span class="filter-btn" data-year="70s">70年代</span>
          <span class="filter-btn" data-year="80s">80年代</span>
          <span class="filter-btn" data-year="90s">90年代</span>
          <span class="filter-btn" data-year="00s">00年代</span>
          <span class="filter-btn" data-year="10s">10年代</span>
        </div>
        <div class="sort-bar">
          <span class="sort-btn active" data-sort="newest">最新发布</span>
          <span class="sort-btn" data-sort="likes">最多点赞</span>
          <span class="sort-btn" data-sort="comments">最多评论</span>
          <span class="sort-btn" data-sort="editor">编辑推荐</span>
        </div>
      </div>
      <div class="discover-content" id="discover-waterfall"></div>
    </div>
    <div id="page-time" class="page">
      <div class="time-header"><h1>时光玩法</h1><p>穿越城市的光影，邂逅被遗忘的记忆</p></div>
      <div class="time-content"><div class="time-grid" id="time-grid-container"></div></div>
    </div>

    <div id="page-upload" class="page">
      <div class="upload-header">
        <div class="upload-back" onclick="app.goBack()"><i class="fas fa-arrow-left"></i></div>
        <h2>发布记忆</h2>
        <div style="width:24px;"></div>
      </div>
      <div class="upload-progress">
        <div class="upload-step active" id="upload-step-1">1. 定位</div>
        <div class="upload-step" id="upload-step-2">2. 照片</div>
        <div class="upload-step" id="upload-step-3">3. 故事</div>
      </div>
      <div class="upload-content">
        <!-- Step 1: Location -->
        <div id="upload-step1" style="display:block;">
          <div class="upload-form-group">
            <label>地标位置</label>
            <div style="display:flex;gap:10px;">
              <input type="text" id="upload-lat" placeholder="纬度" readonly style="flex:1;">
              <input type="text" id="upload-lng" placeholder="经度" readonly style="flex:1;">
            </div>
            <div id="upload-map" style="height:200px;margin-top:10px;border-radius:8px;background:#eee;"></div>
          </div>
          <button class="upload-btn primary" onclick="app.nextUploadStep()">下一步</button>
        </div>

        <!-- Step 2: Photo -->
        <div id="upload-step2" style="display:none;">
          <div class="upload-form-group">
            <label>老照片</label>
            <div id="old-photo-upload" class="upload-area"></div>
          </div>
          <div class="upload-form-group">
            <label>新照片（可选）</label>
            <div id="new-photo-upload" class="upload-area"></div>
          </div>
          <div style="display:flex;gap:10px;">
            <button class="upload-btn" onclick="app.prevUploadStep()" style="background:#eee;color:#333;">上一步</button>
            <button class="upload-btn primary" onclick="app.nextUploadStep()">下一步</button>
          </div>
        </div>

        <!-- Step 3: Story -->
        <div id="upload-step3" style="display:none;">
          <div class="upload-form-group">
            <label>地标名称</label>
            <input type="text" id="upload-title" placeholder="例如：老火车站">
          </div>
          <div class="upload-form-group">
            <label>年代</label>
            <select id="upload-year">
              <option value="">请选择年代</option>
              <option value="70s">70年代</option>
              <option value="80s">80年代</option>
              <option value="90s">90年代</option>
              <option value="00s">00年代</option>
              <option value="10s">10年代</option>
            </select>
          </div>
          <div class="upload-form-group">
            <label>回忆故事</label>
            <textarea id="upload-story" placeholder="写下你的回忆..." rows="4"></textarea>
          </div>
          <div class="upload-form-group">
            <label>标签</label>
            <input type="text" id="upload-tags" placeholder="空格分隔">
          </div>
          <div class="upload-form-group" style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="upload-anonymous"> <label for="upload-anonymous" style="margin:0;">匿名发布</label>
          </div>
          <div class="upload-form-group" style="display:none;">
            <input type="checkbox" id="use-streetview">
          </div>
          <div class="upload-form-group">
            <label>隐私设置</label>
            <div style="display:flex;gap:10px;">
              <div class="privacy-option active" id="privacy-private" onclick="app.selectPrivacy('private')">私密</div>
              <div class="privacy-option" id="privacy-public" onclick="app.selectPrivacy('public')">公开</div>
            </div>
            <div id="privacy-notice" style="font-size:12px;color:#888;margin-top:5px;"></div>
          </div>
          <div id="upload-preview" style="margin-top:20px;"></div>
          <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="upload-btn" onclick="app.prevUploadStep()" style="background:#eee;color:#333;">上一步</button>
            <button class="upload-btn primary" onclick="app.publishMemory()">发布</button>
          </div>
          <div id="ai-preview" style="display:none;"></div>
        </div>
      </div>
    </div>

    <div id="page-profile" class="page">
      <div class="profile-header">
        <div class="profile-avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="头像"></div>
        <div class="profile-info"><h2 id="profile-name">城市记忆者</h2><p id="profile-bio">记录每一座城市的变迁</p></div>
      </div>
      <div class="profile-menu" id="profile-menu"></div>
    </div>
    <nav class="bottom-tab-bar" id="bottom-tab">
      <div class="tab-item active" data-page="map"><i class="fas fa-map-marked-alt"></i><span>地图</span></div>
      <div class="tab-item" data-page="discover"><i class="fas fa-compass"></i><span>发现</span></div>
      <div class="tab-item" data-page="time"><i class="fas fa-hourglass-half"></i><span>时光</span></div>
      <div class="tab-item" data-page="profile"><i class="fas fa-user"></i><span>我的</span></div>
    </nav>
    <div id="toast" class="toast"></div>
  </div>
  <div id="memory-detail" class="detail-modal">
    <div class="detail-backdrop" onclick="app.closeDetail()"></div>
    <div class="detail-sheet">
      <div class="detail-handle"></div>
      <div class="detail-content" id="detail-content"></div>
    </div>
  </div>
  <script src="data.js?v=20250707l"></script>
  <script src="js/china_cities_expanded.js?v=20250707l"></script>
  <script src="js/utils/color.js"></script>
  <script>
    (function() {
      var _orig = document.getElementById;
      var safeIds = ['profile-name','profile-bio','stat-memories','stat-likes','stat-cities',
                     'myuploads-list','myfavorites-list','fp-memories','fp-cities','fp-routes','footprint-list',
                     'shop-list','badge-grid','capsule-list','capsule-sent','capsule-received',
                     'route-list','route-detail-content','heritage-list','activity-list',
                     'challenge-list','private-list','starmap-canvas','fragments-list','story-content',
                     'quiz-container','blindbox-result','postcard-preview','poster-modal',
                     'image-preview-modal','image-preview-img','settings-panel',
                     'comment-input','back-to-top'];
      document.getElementById = function(id) {
        var el = _orig.call(document, id);
        if (!el && safeIds.indexOf(id) !== -1) {
          return {
            textContent: '', set textContent(v) {},
            innerHTML: '', set innerHTML(v) {},
            style: {},
            classList: { add: function(){}, remove: function(){}, contains: function(){ return false; }, toggle: function(){} },
            addEventListener: function(){}, removeEventListener: function(){},
            setAttribute: function(){}, getAttribute: function(){ return null; },
            appendChild: function(){ return this; }, remove: function(){},
            querySelector: function(){ return null; },
            querySelectorAll: function(){ return []; },
            getBoundingClientRect: function(){ return {top:0,left:0,width:0,height:0}; },
            scrollTo: function(){}, scrollIntoView: function(){},
            focus: function(){}, blur: function(){}, click: function(){}
          };
        }
        return el;
      };
    })();
  </script>
  <script src="app.js?v=20250707l"></script>
  <script src="js/perf-patch.js?v=20250707l"></script>
  <script src="js/app-patch.js?v=20250707l"></script>
  <script src="js/city-picker-fix.js?v=20250707l"></script>
  <script src="js/ux-patch.js?v=20250707l"></script>
  <script src="js/content-patch.js?v=20250707l"></script>
  <script src="js/data-persist.js?v=20250707l"></script>
  <script src="js/nationwide-data.js?v=20250707m"></script>
  <script src="js/search-index.js?v=20250707l"></script>
  <script src="js/mobile-adapt.js?v=20250707l"></script>
</body>
</html>
